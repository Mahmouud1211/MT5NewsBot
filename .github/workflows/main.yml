name: AI News Daily Deployment

on:
  schedule:
    # يعمل يومياً الساعة 8:00 صباحاً بتوقيت عمان والرياض (5:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch: # يسمح لك بالتشغيل اليدوي للتجربة فوراً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install feedparser requests google-generativeai

      - name: Run AI Summarizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py
